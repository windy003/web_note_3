{% extends "base.html" %}

{% block content %}
<div class="container mt-3">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <h1 class="mb-4">新建笔记</h1>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="title" class="form-label">标题</label>
                    <input type="text" class="form-control" id="title" name="title"
                           required style="font-size: 20px; padding: 12px 15px;">
                </div>

                <div class="mb-3">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <label for="content" class="form-label mb-0">内容</label>
                        <div>
                            <button type="submit" class="btn btn-sm btn-primary me-2">
                                <i class="bi bi-check-lg"></i> 保存
                            </button>
                            <a href="{% url 'home' %}" class="btn btn-sm btn-secondary">
                                <i class="bi bi-x-lg"></i> 取消
                            </a>
                        </div>
                    </div>
                    <textarea class="form-control" id="content" name="content" rows="10"
                              style="font-size: 22px; line-height: 1.8; padding: 20px;"></textarea>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
